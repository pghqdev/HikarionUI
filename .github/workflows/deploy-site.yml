name: Deploy docs site

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - name: Build framework (dist)
        run: bun install && bun run check && bun run build
      - name: Build site
        working-directory: site
        # Custom domain (site/public/CNAME), so the site is at an origin root:
        # BASE_PATH stays "/" and robots.txt / canonicals resolve. Reverting to
        # project Pages means BASE_PATH=/HikarionUI/ and SITE_URL to match.
        env:
          BASE_PATH: /
          SITE_URL: https://hikarion.dev
        run: bun install && bun run sync-assets.mjs && bun run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
